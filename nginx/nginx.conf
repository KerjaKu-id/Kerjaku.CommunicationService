worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' keep-alive;
  }

  map $http_origin $cors_origin {
    default $http_origin;
    '' '';
  }

  upstream communication_service {
    least_conn;
    server communication-service:8080;
    keepalive 32;
  }

  upstream identity_service {
    least_conn;
    server identity-service:8081;
    keepalive 32;
  }

  upstream marketplace_service {
    least_conn;
    server marketplace-service:8082;
    keepalive 32;
  }

  upstream order_service {
    least_conn;
    server order-service:8083;
    keepalive 32;
  }

  upstream notification_service {
    least_conn;
    server notification-service:8084;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    if ($request_method = OPTIONS) {
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With, X-Request-Id' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      add_header 'Access-Control-Max-Age' 86400 always;
      add_header 'Vary' 'Origin' always;
      return 204;
    }

    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Type, Date, Server, X-Request-Id' always;
    add_header 'Vary' 'Origin' always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    location = /health {
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    location = /health/communication {
      proxy_pass http://communication_service/health;
    }

    location = /health/identity {
      proxy_pass http://identity_service/health;
    }

    location = /health/marketplace {
      proxy_pass http://marketplace_service/health;
    }

    location = /health/orders {
      proxy_pass http://order_service/health;
    }

    location = /health/notifications {
      proxy_pass http://notification_service/health;
    }

    location = /chat {
      return 308 /chat/;
    }

    location = /chat/hubs {
      return 308 /chat/hubs/;
    }

    location = /auth {
      return 308 /auth/;
    }

    location = /marketplace {
      return 308 /marketplace/;
    }

    location = /orders {
      return 308 /orders/;
    }

    location = /notifications {
      return 308 /notifications/;
    }

    location /chat/hubs/ {
      proxy_pass http://communication_service/hubs/;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
    }

    location /chat/ {
      proxy_pass http://communication_service;
    }

    location /auth/ {
      proxy_pass http://identity_service;
    }

    location /marketplace/ {
      proxy_pass http://marketplace_service;
    }

    location /orders/ {
      proxy_pass http://order_service;
    }

    location /notifications/ {
      proxy_pass http://notification_service;
    }
  }
}
