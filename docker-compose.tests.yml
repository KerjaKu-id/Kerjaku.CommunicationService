services:
  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - communication-service
      - identity-service
      - marketplace-service
      - order-service
      - notification-service
    networks:
      - microservices-net
    restart: unless-stopped

  communication-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__CommunicationDb=Server=sqlserver;Database=CommunicationDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False;
      - RabbitMq__HostName=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__UserName=guest
      - RabbitMq__Password=guest
      - RabbitMq__ExchangeName=communication.events
      - TemporaryChat__DefaultTtlHours=4
      - ChatExpirationWorker__CheckIntervalSeconds=60
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - microservices-net

  identity-service:
    image: nginx:1.27-alpine
    networks:
      - microservices-net

  marketplace-service:
    image: nginx:1.27-alpine
    networks:
      - microservices-net

  order-service:
    image: nginx:1.27-alpine
    networks:
      - microservices-net

  notification-service:
    image: nginx:1.27-alpine
    networks:
      - microservices-net

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - microservices-net

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - microservices-net

volumes:
  sqlserver-data:

networks:
  microservices-net:
    name: microservices-net
